{%extends "base.html"%}
{%block title%}Students{%endblock%}
{%block content%}
    <h1>Students</h1>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Action</th>
        </tr>
        {% for s in students%}
            <tr>
                <td>
                    {{ s[0]}}
                </td>
                <td>
                    {{ s[1]}}
                </td>
                <td>
                    {{ s[2]}}
                </td>
                <td>
                    {{ s[3]}}
                </td>
                <td>
                    <a href="/update/{{ s[0] }}">Update</a>
                    <a href="/delete/{{ s[0] }}">Delete</a>
                </td>
            </tr>
        {% endfor %}
    </table>
{%endblock%}
